copyright = 'Copyright © {year} Fachschaft Informatik'
pluralizeListTitles = false
enableEmoji = true

defaultContentLanguage = "de"
defaultContentLanguageInSubdir = true

enableRobotsTxt = true

[outputs]
home = ["html", "sveltia"]

[outputFormats.sveltia]
baseName = "sveltia-config"
mediaType = 'application/json'
root = true
notAlternative = true

[params]
impressumURL = "/impressum"
contactURL = "/kontakt"
datenschutzURL = "/datenschutz"
homepageList = ["news", "protokolle"]

[params.flags]
de = "🇩🇪"
en = "🇬🇧"

[params.sectionIcons]
protokolle = "icons/outline/script.svg"
news = "icons/outline/coin-euro.svg"

[markup.goldmark.renderer]
unsafe = true
hardWraps = true

[params.socials.instagram]
url = "https://www.instagram.com/hhufscs/"
icon = "icons/outline/brand-instagram.svg"

[params.socials.github]
url = "https://github.com/fscs"
icon = "icons/outline/brand-github.svg"

# languages
[languages.de]
label = "Deutsch"
title = "Fachschaft Informatik"
locale = "de"
direction = "ltr"

[languages.en]
label = "English"
title = "Fachschaft Informatik"
locale = "en"
direction = "ltr"

